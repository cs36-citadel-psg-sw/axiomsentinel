  <circle cx="950" cy="200" r="45" stroke="#222222" stroke-width="1"/>
  
  <path d="M 790 200 L 1110 200" stroke="#1A1A1A" stroke-width="1"/>
  <path d="M 950 40 L 950 360" stroke="#1A1A1A" stroke-width="1"/>

  <path d="M 950 200 L 1030 140 L 1100 140" stroke="#FDFDFD" stroke-width="1.5" fill="none"/>
  <path d="M 950 200 L 880 270 L 810 270" stroke="#FDFDFD" stroke-width="1.5" fill="none" stroke-opacity="0.5"/>
  
  <circle cx="950" cy="200" r="6" fill="#FFBF00"/>
  <circle cx="1030" cy="140" r="4" fill="#FDFDFD"/>
  <circle cx="880" cy="270" r="4" fill="#888888"/>

  <text x="1110" y="144" fill="#FDFDFD" font-family="'JetBrains Mono', monospace, sans-serif" font-size="12" letter-spacing="1">SYNC_LOCK</text>

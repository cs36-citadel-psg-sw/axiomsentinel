<svg width="1200" height="400" viewBox="0 0 1200 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  
  <rect width="1200" height="400" fill="#050505"/>

  <defs>
    <pattern id="bunker-grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#111111" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="400" fill="url(#bunker-grid)"/>

  <rect x="0" y="0" width="1200" height="4" fill="#FFBF00"/>

  <rect x="30" y="40" width="4" height="320" fill="#111111"/>
  <rect x="30" y="160" width="4" height="80" fill="#FFBF00"/>

  <text x="80" y="190" fill="#FDFDFD" font-family="'JetBrains Mono', monospace, sans-serif" font-size="52" font-weight="bold" letter-spacing="8">AXIOM SENTINEL</text>
  <text x="85" y="235" fill="#FFBF00" font-family="'JetBrains Mono', monospace, sans-serif" font-size="18" font-weight="bold" letter-spacing="4">ARCHITECTURE OF AUTHORITY // CTI NODE</text>
  
  <text x="85" y="270" fill="#555555" font-family="'JetBrains Mono', monospace, sans-serif" font-size="12" font-weight="normal" letter-spacing="2">SYS.STATE: SECURE • GRID_DEF: 8PT • ENVIRONMENT: HARDENED</text>

  <circle cx="950" cy="200" r="140" stroke="#111111" stroke-width="2"/>
